name: Bug Report
description: Report a bug in a skill, pack, or CI pipeline
labels: ["kind/bug", "triage/needs-triage"]
body:
  - type: dropdown
    id: pack
    attributes:
      label: Affected pack
      options:
        - rh-sre
        - rh-developer
        - rh-virt
        - rh-automation
        - rh-ai-engineer
        - rh-basic
        - ocp-admin
        - rh-support-engineer
        - CI / repo infrastructure
        - Other
    validations:
      required: true

  - type: input
    id: skill
    attributes:
      label: Affected skill (if applicable)
      placeholder: "e.g. remediation, cve-impact"

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the bug briefly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: What should have happened instead.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Invoke skill X with ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, environment details, or anything else relevant.
