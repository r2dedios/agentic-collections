name: Feature Request
description: Suggest a new skill, pack improvement, or repo enhancement
labels: ["kind/feature", "triage/needs-triage"]
body:
  - type: dropdown
    id: type
    attributes:
      label: What area does this relate to?
      options:
        - New skill
        - Existing skill improvement
        - New pack
        - Existing pack improvement
        - CI / automation
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: pack
    attributes:
      label: Related pack (if applicable)
      placeholder: "e.g. rh-sre, rh-virt"

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      placeholder: What problem does this solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Other approaches you've thought about (optional).
