name: Federation Request
description: Request to federate a new external pack or update an existing federation
labels: ["federation"]
body:
  - type: markdown
    attributes:
      value: |
        ## Federation Request

        Use this form to:
        - **New federation**: Request that your external agentic pack be listed in the catalog
        - **Update**: Request a ref update for an already-federated pack

        Your code stays in your repo — we reference it in our marketplace.

        See the [Federation Review Guide](https://github.com/RHEcosystemAppEng/agentic-collections/blob/main/docs/FEDERATION_REVIEW_GUIDE.md) for the full evaluation criteria.

  - type: dropdown
    id: request_type
    attributes:
      label: Request type
      description: Are you requesting a new federation or updating an existing one?
      options:
        - New federation
        - Update existing federation
    validations:
      required: true

  - type: input
    id: contact
    attributes:
      label: Owner / Contact
      description: Name and email (or GitHub handle) of the person responsible for this pack
      placeholder: "@github-handle or name <email>"
    validations:
      required: true

  - type: input
    id: repository_url
    attributes:
      label: Repository URL
      description: Public GitHub repository containing the agentic pack
      placeholder: https://github.com/org/repo
    validations:
      required: true

  - type: input
    id: ref
    attributes:
      label: Ref (commit SHA or release tag)
      description: A stable ref — not a branch name. Use a full commit SHA or a release tag.
      placeholder: v1.0.0 or a1b2c3d4e5f6...
    validations:
      required: true

  - type: input
    id: pack_name
    attributes:
      label: Pack name
      description: Name of the agentic pack (as registered or to be registered in our marketplace)
      placeholder: my-agentic-pack
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Pack description
      description: Brief description of what the pack does, who it's for, and what value it provides. For updates, describe what changed in this version.
      placeholder: |
        New: This pack automates X for Y engineers working with Z...
        Update: v2.1.0 adds 3 new skills for network diagnostics and fixes MCP pinning issues.
    validations:
      required: true

  - type: input
    id: license
    attributes:
      label: Repository license
      description: Must be compatible with Apache 2.0 (e.g., Apache-2.0, MIT, BSD-2-Clause, BSD-3-Clause)
      placeholder: Apache-2.0
    validations:
      required: true

  - type: input
    id: marketplace_yaml_url
    attributes:
      label: Marketplace YAML URL (if available)
      description: URL to the pack's Lola marketplace YAML file, if the repo has one
      placeholder: https://raw.githubusercontent.com/org/repo/main/marketplace/my-pack.yml
    validations:
      required: false

  - type: checkboxes
    id: ai_agents
    attributes:
      label: Compatible AI agents
      description: Which AI agents/assistants are these skills compatible with?
      options:
        - label: Claude Code
        - label: Cursor
        - label: ChatGPT
        - label: Other (specify in description above)

  - type: input
    id: pack_path
    attributes:
      label: Pack path within repository (optional)
      description: If the Lola pack is not at the repository root, specify the subdirectory path. Leave empty if the pack is at the root.
      placeholder: "my-pack (or leave empty for repo root)"
    validations:
      required: false

  - type: textarea
    id: skills_subset
    attributes:
      label: Skills to federate (optional)
      description: Leave empty to federate the entire pack. If you only want specific skills included, list their paths (one per line).
      placeholder: |
        skills/my-skill-1/SKILL.md
        skills/my-skill-2/SKILL.md
    validations:
      required: false

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Pre-submission checklist
      description: For updates, confirm that the new version still meets all requirements.
      options:
        - label: The repository is public and accessible
          required: true
        - label: The pack has a valid Lola structure (CLAUDE.md, README.md, skills/, mcps.json)
          required: true
        - label: Skills pass Tier 1 validation (agentskills.io spec)
          required: true
        - label: Skills pass Tier 2 validation (design principles)
          required: true
        - label: No hardcoded credentials (uses `${ENV_VAR}` format)
          required: true
        - label: MCP server images use pinned versions or SHAs (no `:latest`)
          required: true
        - label: The license is compatible with Apache 2.0
          required: true
        - label: The ref provided is stable (commit SHA or release tag, not a branch)
          required: true
