name: Federation Validation

on:
  pull_request:
    types: [labeled, opened, synchronize]

jobs:
  validate-federation:
    if: contains(github.event.pull_request.labels.*.name, 'federation')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: |
          source $HOME/.cargo/env
          make install

      - name: Detect federated module changes
        id: detect
        run: |
          source $HOME/.cargo/env
          # Extract new federated_modules entries from the PR diff
          uv run python -c "
          import yaml, json, subprocess, sys

          # Get marketplace YAML from PR branch
          with open('marketplace/rh-agentic-collection.yml') as f:
              data = yaml.safe_load(f) or {}

          modules = data.get('federated_modules') or []
          if not isinstance(modules, list):
              modules = []

          # Filter to actual entries (not empty list)
          modules = [m for m in modules if isinstance(m, dict) and m.get('repository')]

          if not modules:
              print('No federated modules found')
              sys.exit(0)

          print(f'Found {len(modules)} federated module(s)')
          for m in modules:
              print(f'  - {m.get(\"name\", \"unknown\")}: {m.get(\"repository\", \"?\")} @ {m.get(\"ref\", \"?\")}')

          # Write module list for next step
          with open('/tmp/federation-modules.json', 'w') as f:
              json.dump(modules, f)
          " || true

          if [ -f /tmp/federation-modules.json ]; then
            echo "has_modules=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_modules=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate federated modules
        id: validate
        if: steps.detect.outputs.has_modules == 'true'
        run: |
          source $HOME/.cargo/env
          uv run python -c "
          import json, subprocess, sys

          with open('/tmp/federation-modules.json') as f:
              modules = json.load(f)

          failed = False
          for mod in modules:
              repo = mod.get('repository', '')
              ref = mod.get('ref', '')
              pack_path = mod.get('pack_path', '.')
              skills = mod.get('skills')
              name = mod.get('name', 'unknown')

              print(f'\n--- Validating: {name} ---')
              cmd = [sys.executable, 'scripts/validate_federation.py', repo, ref, '--pack-path', pack_path]
              if skills:
                  cmd.extend(['--skills'] + skills)

              result = subprocess.run(cmd)
              if result.returncode != 0:
                  failed = True

          sys.exit(1 if failed else 0)
          "

      - name: Post results as PR comment
        if: always() && steps.detect.outputs.has_modules == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ steps.validate.outcome }}' === 'success';
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';

            const icon = success ? '✅' : '❌';
            const status = success ? 'ALL CHECKS PASSED' : 'VALIDATION FAILED';

            const body = `## ${icon} Federation Validation: ${status}

            Automated validation ran on federated modules declared in \`marketplace/rh-agentic-collection.yml\`.

            | Check | Description |
            |-------|-------------|
            | Clone & access | Repository cloned at pinned ref |
            | Lola structure | CLAUDE.md, README.md, mcps.json, skills/ |
            | Tier 1 | agentskills.io spec compliance |
            | Tier 2 | Design principles compliance |
            | MCP pinning | No \`:latest\` tags, no hardcoded credentials |
            | Credential scan | gitleaks secret detection |

            [See workflow run for full details](${runUrl})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Skip (no federated modules)
        if: steps.detect.outputs.has_modules == 'false'
        run: echo "No federated modules found in marketplace YAML, nothing to validate."
