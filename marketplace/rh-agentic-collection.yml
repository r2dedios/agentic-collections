      - "automation"
      - "red-hat"
      - "governance"
      - "troubleshooting"
      - "execution"

# Federated modules — skills hosted in external repositories, referenced by URL + pinned ref.
# Each entry points to a public repo; the build fetches skills at the pinned ref,
# validates them (Tier 1), and includes them in the catalog under the target pack.
# To request federation, open a GitHub issue using the "Federation Request" template.
federated_modules: []
